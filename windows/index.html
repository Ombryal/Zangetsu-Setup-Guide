<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Windows Setup | Zangetsu</title>
    <link rel="stylesheet" href="../assets/styles.css" />
    <script defer src="../assets/app.js"></script>
  </head>
  <body data-page="windows">
    <header class="topbar">
      <div>
        <p class="eyebrow">Zangetsu</p>
        <h1>Windows Setup Guide</h1>
        <p class="subtext">Download the Windows build from GitHub Releases.</p>
      </div>
      <a class="ghost-button" href="../">Back to Setup Guide</a>
    </header>

    <main class="content">
      <section class="panel">
        <h2>Latest download</h2>
        <div id="download-area" class="download-area">
          <p>Loading release data…</p>
        </div>
      </section>

      <section class="panel">
        <h2>Steps</h2>
        <ol>
          <li>Download the latest Windows installer.</li>
          <li>Run the installer or extract the portable build.</li>
          <li>Follow the prompts.</li>
          <li>Open Zangetsu.</li>
        </ol>
      </section>
    </main>
  </body>
</html>
