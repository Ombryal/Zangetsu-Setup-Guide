<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Android Install | Zangetsu</title>
    <meta name="description" content="Step‑by‑step Android installation guide for Zangetsu." />
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
    <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="../assets/styles.css" />
    <script defer src="../assets/app.js"></script>
    <script defer src="../assets/download.js"></script>
  </head>
  <body data-page="android-install">
    <div class="bg-cyber" aria-hidden="true">
      <div class="kanji-watermark">残月</div>
      <div class="crescent-moon"></div>
      <div class="diagonal-line"></div>
    </div>

    <a class="skip-link" href="#main-content">Skip to main content</a>

    <!-- Header (compact) -->
    <header class="topbar compact-header">
      <div class="header-left">
        <span class="logo-text">Zangetsu</span>
      </div>
      <div class="header-right">
        <div class="device-selector pill-box">
          <span class="device-icon">📱</span>
          <span class="device-name">Android</span>
          <a href="../guide/" class="ghost-button change-btn pill-btn">Change</a>
        </div>
        <a href="../settings/" class="settings-icon" aria-label="Settings">⚙️</a>
      </div>
    </header>

    <!-- Introduction -->
    <section class="intro-section content">
      <h1>Setup Guide</h1>
      <p class="subtext">Follow the steps for your device to get started with Zangetsu extensions.</p>
    </section>

    <!-- Release selection (compact) -->
    <div class="content release-tabs">
      <button class="tab-btn pill-btn active">Stable</button>
      <button class="tab-btn pill-btn" disabled>Beta</button>
      <a href="https://github.com/Spyou/Zangetsu/releases" target="_blank" rel="noopener noreferrer" class="pill-link">All releases →</a>
    </div>

    <!-- Main step card -->
    <main id="main-content" class="content step-layout" aria-labelledby="step-heading">
      <!-- Progress bar -->
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar" style="width: 20%;"></div>
      </div>
      <p class="step-count" id="step-count">Step 1 of 5</p>

      <section class="panel step-card">
        <!-- Dynamic step content injected by JS -->
        <div id="step-content"></div>

        <!-- Step navigation -->
        <div class="step-nav">
          <div class="step-dots" id="step-dots">
            <span class="dot active" data-step="1"></span>
            <span class="dot" data-step="2"></span>
            <span class="dot" data-step="3"></span>
            <span class="dot" data-step="4"></span>
            <span class="dot" data-step="5"></span>
          </div>
          <div class="nav-buttons">
            <button class="ghost-button prev-btn" id="prev-btn" disabled>← Previous</button>
            <button class="ghost-button next-btn" id="next-btn">Next →</button>
          </div>
        </div>
      </section>
    </main>

    <!-- Quick‑access cards -->
    <div class="content quick-cards">
      <a href="../repos/" class="card quick-card">
        <div>
          <h3>Browse Repos</h3>
          <p>Copy repo URLs to add manually</p>
        </div>
        <span class="external-icon">↗</span>
      </a>
    </div>

    <!-- Footer -->
    <footer class="content footer-bar">
      <a href="../" class="footer-link">Zangetsu Extension Guide</a>
      <a href="../repos/" class="footer-link">Repos</a>
    </footer>

    <script>
      (function() {
        // ---------- Step content definitions ----------
        const steps = [
          { // Step 1
            title: "Choose the Correct APK",
            desc: "Before downloading, select the APK that matches your device.",
            html: `
              <div class="download-options" id="apk-list">
                <p class="loading-spinner"><span>Loading downloads…</span></p>
              </div>
              <p class="step-note">If you don't know your device's architecture, simply download the <strong>Universal APK</strong>.</p>
            `
          },
          { // Step 2
            title: "Download the APK",
            desc: "Tap the download button for your chosen APK.",
            html: `
              <p>Tap the download button for your chosen APK.</p>
              <p>Your browser may display a warning because the app isn't downloaded from the Google Play Store. If prompted, tap <strong>Download anyway</strong>, <strong>Keep</strong>, or <strong>Continue</strong>.</p>
              <p>Wait for the download to finish before continuing.</p>
            `
          },
          { // Step 3
            title: "Open the Downloaded File",
            desc: "Once the download is complete, open the APK.",
            html: `
              <p>Once the download is complete:</p>
              <ul>
                <li>Tap the download notification, <strong>or</strong></li>
                <li>Open your <strong>Downloads</strong> folder and locate the <code>.apk</code> file.</li>
              </ul>
              <p>Tap the APK to begin the installation.</p>
            `
          },
          { // Step 4
            title: "Install Zangetsu",
            desc: "Complete the installation process.",
            html: `
              <p>If Android blocks the installation, tap <strong>Settings</strong> and enable <strong>Allow from this source</strong> or <strong>Install unknown apps</strong> for the browser or file manager you're using.</p>
              <p>Return to the installer, tap <strong>Install</strong>, and wait for the installation to complete.</p>
            `
          },
          { // Step 5
            title: "Open Zangetsu",
            desc: "Launch the app and get started.",
            html: `
              <p>When the installation is complete, tap <strong>Open</strong> to launch Zangetsu.</p>
              <p>If you choose <strong>Done</strong>, you can open the app later from your <strong>Home Screen</strong> or <strong>App Drawer</strong>.</p>
            `
          }
        ];

        let currentStep = 1;
        const totalSteps = 5;

        // DOM elements
        const progressBar = document.getElementById('progress-bar');
        const stepCountEl = document.getElementById('step-count');
        const stepContent = document.getElementById('step-content');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const dots = document.querySelectorAll('.dot');

        // Render a step
        function renderStep(step) {
          const data = steps[step-1];
          let html = `
            <div class="step-header">
              <div class="step-badge">${step}</div>
              <div class="step-title">
                <h2 id="step-heading">${data.title}</h2>
                <p class="step-desc">${data.desc}</p>
              </div>
            </div>
            ${data.html}
          `;
          stepContent.innerHTML = html;

          // If step 1, load APK list
          if (step === 1) {
            loadApkList();
          }

          // Update progress
          const percent = (step / totalSteps) * 100;
          progressBar.style.width = percent + '%';
          stepCountEl.textContent = `Step ${step} of ${totalSteps}`;

          // Update dots
          dots.forEach(d => {
            const s = parseInt(d.dataset.step);
            d.classList.toggle('active', s <= step);
          });

          // Buttons state
          prevBtn.disabled = (step === 1);
          if (step === totalSteps) {
            nextBtn.textContent = 'Finish';
          } else {
            nextBtn.textContent = 'Next →';
          }
        }

        // APK list loader
        function loadApkList() {
          const container = document.getElementById('apk-list');
          if (!container) return;

          function tryRender() {
            if (window.__latestAssets && window.__latestAssets.length > 0) {
              const apks = window.__latestAssets.filter(a => a.name.toLowerCase().endsWith('.apk'));
              if (apks.length === 0) {
                container.innerHTML = '<p>No APK files found in the latest release.</p>';
                return;
              }
              // Try to categorize
              const universal = apks.find(a => a.name.toLowerCase().includes('universal'));
              const arm64 = apks.find(a => a.name.toLowerCase().includes('arm64-v8a') || a.name.toLowerCase().includes('arm64'));
              const armv7 = apks.find(a => a.name.toLowerCase().includes('armeabi-v7a') || a.name.toLowerCase().includes('armv7'));
              const other = apks.filter(a => !universal && !arm64 && !armv7);

              container.innerHTML = '';
              if (universal) container.appendChild(createApkRow(universal, 'Universal APK (Recommended)', 'Works on almost all Android devices.'));
              if (arm64) container.appendChild(createApkRow(arm64, 'ARM64 (arm64-v8a)', 'For most modern Android phones and tablets with a 64-bit processor.'));
              if (armv7) container.appendChild(createApkRow(armv7, 'ARMv7 (armeabi-v7a)', 'For older Android devices that use a 32-bit processor.'));
              if (other.length > 0) {
                other.forEach(apk => container.appendChild(createApkRow(apk, apk.name, 'Additional variant')));
              }
            } else {
              container.innerHTML = '<p class="loading-spinner"><span>Loading downloads…</span></p>';
              setTimeout(tryRender, 300);
            }
          }

          function createApkRow(asset, label, description) {
            const row = document.createElement('a');
            row.className = 'download-row-item';
            row.href = asset.browser_download_url;
            row.target = '_blank';
            row.rel = 'noopener noreferrer';
            row.innerHTML = `
              <span class="download-icon">⬇️</span>
              <div class="apk-info">
                <span class="apk-label">${label}</span>
                <span class="apk-desc">${description}</span>
              </div>
            `;
            return row;
          }

          tryRender();
        }

        // Navigation
        function goToStep(step) {
          currentStep = step;
          renderStep(step);
          window.scrollTo({ top: document.getElementById('main-content').offsetTop - 20, behavior: 'smooth' });
        }

        nextBtn.addEventListener('click', () => {
          if (currentStep < totalSteps) {
            goToStep(currentStep + 1);
          } else {
            // Finish – could redirect or reset
            alert('Installation guide complete!');
          }
        });

        prevBtn.addEventListener('click', () => {
          if (currentStep > 1) {
            goToStep(currentStep - 1);
          }
        });

        // Initialize
        renderStep(1);
      })();
    </script>
  </body>
</html>
