<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Changelog | Zangetsu</title>
    <meta name="description" content="See what’s new in each Zangetsu release." />
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
    <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png" />
    <link rel="stylesheet" href="../assets/styles.css" />
    <link rel="canonical" href="https://yourdomain.com/changelog/" />
    <link rel="dns-prefetch" href="https://api.github.com" />
    <script defer src="../assets/app.js"></script>
  </head>
  <body data-page="changelog">
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <header class="topbar">
      <div>
        <p class="eyebrow">Zangetsu</p>
        <h1 id="page-title">Changelog</h1>
        <p class="subtext">All release notes in one place. Updates are fetched from GitHub or a local file.</p>
      </div>
      <a class="ghost-button" href="../">Back to Setup Guide</a>
    </header>

    <main id="main-content" class="content" aria-labelledby="page-title">
      <div id="changelog-content" class="panel" style="display: grid; gap: 1.5rem;">
        <p>Loading changelog…</p>
      </div>
    </main>

    <button id="back-to-top" class="back-to-top" aria-label="Back to top">↑</button>

    <script>
      const CHANGELOG_LOCAL = "../changelog.json";
      const API_URL = "https://api.github.com/repos/Spyou/Zangetsu/releases";

      async function loadChangelog() {
        const container = document.getElementById("changelog-content");
        if (!container) return;

        try {
          let releases;

          // Try local changelog.json first
          try {
            const resp = await fetch(CHANGELOG_LOCAL);
            if (resp.ok) {
              releases = await resp.json();
            }
          } catch (e) { /* ignore */ }

          // Fallback to GitHub API
          if (!releases || releases.length === 0) {
            const apiResp = await fetch(API_URL, {
              headers: { Accept: "application/vnd.github+json" },
            });
            if (!apiResp.ok) throw new Error("API error: " + apiResp.status);
            releases = await apiResp.json();
            // Cache in sessionStorage for 10 minutes
            sessionStorage.setItem("changelog", JSON.stringify({ releases, time: Date.now() }));
          }

          // Render
          container.innerHTML = "";
          releases.forEach((release) => {
            const div = document.createElement("div");
            div.className = "release-entry";

            const heading = document.createElement("h2");
            heading.textContent = release.tag_name || "Release";

            const date = document.createElement("small");
            date.textContent = release.published_at
              ? new Date(release.published_at).toLocaleDateString(undefined, {
                  year: "numeric",
                  month: "long",
                  day: "numeric",
                })
              : "";

            const body = document.createElement("div");
            body.className = "release-body";
            body.innerHTML = (release.body || "")
              .replace(/\r\n/g, "\n")
              .replace(/\n/g, "<br>")
              .replace(/- (.+)/g, "• $1");

            div.appendChild(heading);
            div.appendChild(date);
            div.appendChild(body);
            container.appendChild(div);
          });
        } catch (error) {
          container.innerHTML = `<p>Could not load changelog: ${error.message}</p>`;
        }
      }

      loadChangelog();
    </script>
  </body>
</html>
